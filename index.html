<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mundial 2026 - Laboratorio 2</title>
  <link rel="stylesheet" href="estilos.css">
</head>
<body>
  <h1>Mundial 2026</h1>
  <p>La pasion del futbol se lleva en el corazon</p>

  <!-- BOTONES DE NAVEGACION -->
  <nav>
    <button class="boton-nav" data-pantalla="tour">Tour de Sedes</button>
    <button class="boton-nav" data-pantalla="agenda">Agenda</button><button class="boton-nav" data-pantalla="timeline">Timeline</button>
    <button class="boton-nav" data-pantalla="dashboard">Dashboard</button>
    <button class="boton-nav" data-pantalla="matriz">Matriz</button>
  </nav>

  <!-- SECCIONES DEL CONTENIDO -->

  <!-- Tour Virtual de Sedes -->
  <section id="tour" class="pantalla">
    <h2>Tour Virtual de Sedes</h2>
    <div id="lista-sedes"></div> 
    <div id="partidos-sede"></div>
  </section>

  <!-- Agenda Simultanea  -->
    <section id="agenda" class="pantalla">
    <h2>Agenda Simultanea</h2>
    <div>
      <button id="agenda-anterior">◀ Fecha anterior</button>
      <span id="agenda-fecha"></span>
      <button id="agenda-siguiente">Fecha siguiente ▶</button>
    </div>
    <div id="agenda-columnas"></div>
  </section>

  



  <section id="timeline" class="pantalla"><h2>Timeline Infinito</h2></section>
  <section id="dashboard" class="pantalla"><h2>Dashboard del Fanatico</h2></section>
  <section id="matriz" class="pantalla"><h2>Matriz de Enfrentamientos</h2></section>

  <script src="app.js"></script>
</body>
</html>
